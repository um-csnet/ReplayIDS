# --- Base Settings ---
batch_size: 256  # Azizi actual
epochs: 8  # Azizi actual (early stop at peak)
learning_rate: 0.0005 # Azizi actual

datasets:
    CICIDS2017:
        num_class: 8
        classes:
            - 'Benign'
            - 'DoS GoldenEye'
            - 'DoS Hulk'
            - 'DoS Slowhttptest'
            - 'DoS slowloris'
            - 'FTP-Patator'
            - 'Heartbleed'
            - 'SSH-Patator'
        Task_A:
            num_class: 3
            classes:
                - 'Benign'
                - 'FTP-Patator'
                - 'SSH-Patator'
        Task_B:
            num_class: 6
            classes:
                - 'Benign'
                - 'DoS GoldenEye'
                - 'DoS Hulk'
                - 'DoS Slowhttptest'
                - 'DoS slowloris'
                - 'Heartbleed'
        Task_C:
            num_class: 4
            classes:
                - 'Benign'
                - 'Web Attack Brute Force'
                - 'Web Attack Sql Injection'
                - 'Web Attack XSS'
            
    UNSWNB15:
        num_class: 10
        classes:
            - 'Benign'
            - 'Analysis'
            - 'Backdoor'
            - 'DoS'
            - 'Exploits'
            - 'Fuzzers'
            - 'Generic'
            - 'Reconnaissance'
            - 'Shellcode'
            - 'Worms'
          
    NBIOT:
        num_class: 11
        classes:
            [
            "bashcombo",
            "bashjunk",
            "bashscan",
            "bashtcp",
            "bashudp",
            "benign",
            "miraiack",
            "miraiscan",
            "miraisyn",
            "miraiudp",
            "miraiudpplain"
            ]

# --- Model Configuration ---
model:
    dim: 32              # Embedding dimension
    depth: 6             # Number of transformer layers
    heads: 10            # Number of attention heads
    attn_dropout: 0.1    # Attention dropout rate
    ff_dropout: 0.1      # Feed-forward dropout rate
    dim_out: 2           # Initial output classes (auto-expanded)

# Execution settings recorded in the EAAI paper contract. CLI flags may
# override these without changing the scientific model configuration.
training:
    optimizer: adamw
    weight_decay: 0.00001
    scheduler: reduce_on_plateau
    scheduler_factor: 0.1
    scheduler_patience: 5
    early_stop_patience: 10
    num_workers: 8
    seed: 42

strategies:
    ewc:
        lambda: 1000.0
        fisher_samples: 4096
    lwf:
        alpha: 0.5
        temperature: 2.0
    icarl:
        exemplar_budget: 2000
    er:
        min_samples_per_class: 5

oracle:
    dim: 64
    heads: 8
